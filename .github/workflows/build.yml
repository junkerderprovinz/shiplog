name: Build & Push Docker Image

# Builds the multi-arch image and pushes it to GHCR on every push to main (and
# manually). Mirrors to Docker Hub once DOCKERHUB_USERNAME (var) + DOCKERHUB_TOKEN
# (secret) are set together. A boot smoke gate boots BOTH arches and requires the
# READY banner + a served request before anything is pushed.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write # Trivy uploads its CVE report (SARIF) to the Security tab

env:
  IMAGE_NAME: ghcr.io/junkerderprovinz/shiplog
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Mirror active only once DOCKERHUB_USERNAME (variable) + DOCKERHUB_TOKEN
      # (secret) are set together. NB: the `secrets` context is not allowed in a
      # step `if`, so gate on the variable; pair the token with it when you set it.
      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.IMAGE_NAME }}
            name=docker.io/${{ vars.DOCKERHUB_USERNAME }}/shiplog,enable=${{ vars.DOCKERHUB_USERNAME != '' }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build amd64 image for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: shiplog:smoke-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build arm64 image for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: true
          tags: shiplog:smoke-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Boot BOTH arches before the push. A green build only proves it compiles;
      # this proves it starts (prints the READY banner) and serves /. SIGPIPE-safe:
      # capture docker logs into a var and substring-match in bash — never
      # `docker logs | grep -q` under pipefail (dies of SIGPIPE when the log grows).
      - name: Smoke test — both arches must boot and serve /
        run: |
          set -euo pipefail
          smoke() {
            local tag="$1" platform="$2" budget="$3"
            local name="sl-smoke-${platform##*/}"
            echo "::group::smoke ${platform}"
            docker run -d --name "$name" --platform "$platform" -p 8484:8484 \
              -v /var/run/docker.sock:/var/run/docker.sock:ro "$tag"
            for i in $(seq 1 "$budget"); do
              logs=$(docker logs "$name" 2>&1 || true)
              if [[ "$logs" == *"SHIPLOG IS READY"* ]] && curl -fsS -o /dev/null http://localhost:8484/; then
                echo "✅ ${platform} ready + serving / after ${i}s"
                docker rm -f "$name" >/dev/null
                echo "::endgroup::"
                return 0
              fi
              sleep 1
            done
            echo "❌ ${platform} not ready within ${budget}s — logs:"
            docker logs "$name" || true
            docker rm -f "$name" >/dev/null
            echo "::endgroup::"
            return 1
          }
          smoke shiplog:smoke-amd64 linux/amd64 30
          smoke shiplog:smoke-arm64 linux/arm64 90

      # Report known CVEs (HIGH/CRITICAL) in the locally-loaded amd64 image to the
      # Security tab (SARIF). Deliberately does NOT fail the build (exit-code 0):
      # most findings live in the distroless base and can't be fixed here, so this
      # is visibility, not a release gate.
      - name: Scan image for CVEs (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: shiplog:smoke-amd64
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
      - name: Upload Trivy results to the Security tab
        if: ${{ github.event_name != 'pull_request' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Supply-chain attestations: SLSA build provenance + an SBOM, attached
          # to the pushed image index. This is a straightforward multi-arch
          # build-push (not push-by-digest + manifest merge), so it's safe here.
          provenance: true
          sbom: true

      # Mirror the GitHub README to the Docker Hub repo's full description (same
      # text as on GitHub; relative image/link paths completed to absolute so they
      # render on Docker Hub). Editing the description needs a credential the push
      # token (DOCKERHUB_TOKEN) lacks — it returns 403 — so this uses a separate
      # DOCKERHUB_PASSWORD secret (Docker Hub account password, or a PAT scoped to
      # edit repos). Skipped until that secret is set, so a missing credential
      # never fails the build.
      - name: Docker Hub description sync ready?
        id: dhdesc
        if: ${{ vars.DOCKERHUB_USERNAME != '' && github.event_name != 'pull_request' }}
        env:
          PW: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          if [ -n "$PW" ]; then echo "go=true" >> "$GITHUB_OUTPUT"; else echo "DOCKERHUB_PASSWORD not set — skipping Docker Hub description sync"; echo "go=false" >> "$GITHUB_OUTPUT"; fi
      - name: Sync README to Docker Hub
        if: ${{ steps.dhdesc.outputs.go == 'true' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
          repository: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          short-description: "Changelog bubbles in the Unraid Docker tab: see what changed before you update a container."
          enable-url-completion: true
